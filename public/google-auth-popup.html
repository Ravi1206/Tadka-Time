<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in with Google</title>
  <!-- Load Inter font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
  <!-- Load Tailwind CSS via CDN for rapid high-quality styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Custom Google-like scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }
  </style>
</head>
<body class="bg-neutral-100 flex items-center justify-center min-h-screen p-4 font-sans select-none antialiased" id="google-auth-body">

  <!-- Background overlay detecting click-outside -->
  <div class="fixed inset-0 bg-black/5 z-0" onclick="closePopup()"></div>

  <!-- Main Google Card -->
  <div class="relative bg-white w-full max-w-md rounded-2xl border border-neutral-200 shadow-2xl z-10 flex flex-col p-8 md:p-10 transition-all duration-200 scale-100" id="google-card" onclick="event.stopPropagation()">
    
    <!-- Close (X) Button in top-right -->
    <button 
      onclick="closePopup()"
      class="absolute top-4 right-4 p-1.5 rounded-full text-neutral-400 hover:text-neutral-700 hover:bg-neutral-100 transition duration-150"
      aria-label="Close"
      id="close-btn"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Google Header -->
    <div class="text-center mb-6">
      <!-- Google Logo -->
      <div class="flex justify-center mb-4">
        <svg class="h-7 w-auto" viewBox="0 0 24 24" width="24" height="24">
          <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.47h6.44c-.28 1.47-1.11 2.71-2.36 3.56l3.66 2.84c2.14-1.98 3.39-4.89 3.39-8.51z" />
          <path fill="#34A853" d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.66-2.84c-1.01.68-2.31 1.09-4.3 1.09-3.07 0-5.76-1.66-6.69-4.5H1.47v2.98C3.39 21.33 7.35 24 12 24z" />
          <path fill="#FBBC05" d="M5.31 14.54c-.24-.72-.38-1.5-.38-2.3s.14-1.58.38-2.3L1.47 6.56C.53 8.46 0 10.58 0 12s.53 3.54 1.47 5.44l3.84-2.9z" />
          <path fill="#EA4335" d="M12 5.04c1.66 0 3.2.57 4.38 1.69l3.27-3.27C17.67 1.47 15 0 12 0 7.35 0 3.39 2.67 1.47 6.56l3.84 2.98C6.24 6.7 8.93 5.04 12 5.04z" />
        </svg>
      </div>
      <h1 class="text-xl font-medium text-neutral-800 tracking-tight" id="title-text">Choose an account</h1>
      <p class="text-xs text-neutral-500 mt-1 leading-relaxed">to continue to <span class="font-semibold text-orange-600">Tadka Club</span></p>
    </div>

    <!-- Accounts Selector Container -->
    <div class="flex-1 overflow-y-auto max-h-[280px] pr-1 space-y-2 mb-4" id="accounts-container">
      <!-- Dynamically populated -->
    </div>

    <!-- "Use another account" Input Section (Hidden by default) -->
    <div id="new-account-section" class="hidden mt-2 p-4 bg-neutral-50 border border-neutral-200 rounded-xl space-y-3">
      <h3 class="text-xs font-semibold text-neutral-700">Add a Google Account</h3>
      <div class="space-y-2">
        <input 
          type="text" 
          id="new-name-input" 
          placeholder="Your Name (e.g., Ravi Kumar)" 
          class="w-full text-xs font-medium border border-neutral-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:border-blue-500"
        />
        <input 
          type="email" 
          id="new-email-input" 
          placeholder="Gmail Address (e.g., ravi@gmail.com)" 
          class="w-full text-xs font-medium border border-neutral-200 rounded-lg px-3 py-2 bg-white focus:outline-none focus:border-blue-500"
        />
      </div>
      <div class="flex justify-end gap-2">
        <button 
          onclick="toggleNewAccount(false)" 
          class="px-3 py-1.5 text-[11px] font-semibold text-neutral-500 hover:bg-neutral-100 rounded-lg transition"
        >
          Cancel
        </button>
        <button 
          onclick="addAndSelectAccount()" 
          class="px-3 py-1.5 text-[11px] font-semibold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition shadow-xs"
        >
          Add & Select
        </button>
      </div>
    </div>

    <!-- Divider -->
    <div class="border-t border-neutral-100 my-4" id="modal-divider"></div>

    <!-- Bottom Actions -->
    <div class="flex flex-col gap-3" id="bottom-actions">
      <!-- Use Another Account Option -->
      <button 
        onclick="toggleNewAccount(true)"
        class="w-full flex items-center justify-start gap-3 p-3.5 rounded-xl border border-dashed border-neutral-200 hover:bg-neutral-50 hover:border-neutral-300 transition duration-150 text-left cursor-pointer"
        id="use-another-btn"
      >
        <div class="h-8 w-8 rounded-full border border-neutral-200 flex items-center justify-center bg-white text-neutral-500 shrink-0">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
          </svg>
        </div>
        <div class="flex-1">
          <p class="text-xs font-semibold text-blue-600 hover:text-blue-700">Use another account</p>
        </div>
      </button>

      <!-- Terms & Privacy -->
      <p class="text-[10px] text-neutral-400 text-center leading-relaxed mt-2">
        To continue, Google will share your name, email address, language preference, and profile picture with Tadka Club. See their Privacy Policy and Terms of Service.
      </p>
    </div>

  </div>

  <script>
    // Default account list
    let accounts = [];

    // Initialize list from localStorage or pre-populate
    function initAccounts() {
      const saved = localStorage.getItem('tadka_google_accounts');
      if (saved) {
        accounts = JSON.parse(saved);
      } else {
        // Prepopulate with current user email from metadata to ensure a perfectly seamless browser session sync!
        accounts = [
          { name: 'Ravi Kumar', email: 'ravikumar870317@gmail.com', avatar: 'R' }
        ];
        localStorage.setItem('tadka_google_accounts', JSON.stringify(accounts));
      }
      renderAccounts();
    }

    // Render the accounts dynamically
    function renderAccounts() {
      const container = document.getElementById('accounts-container');
      container.innerHTML = '';

      if (accounts.length === 0) {
        container.innerHTML = `
          <div class="text-center py-6 text-neutral-400 text-xs">
            No signed-in Google accounts found. Use the option below to add one.
          </div>
        `;
        return;
      }

      accounts.forEach((acc, index) => {
        const firstLetter = acc.avatar || acc.name.charAt(0).toUpperCase();
        
        // Random bg color for avatars to make it look premium
        const bgColors = ['bg-orange-600', 'bg-blue-600', 'bg-emerald-600', 'bg-indigo-600', 'bg-pink-600', 'bg-amber-600'];
        const bgColorClass = bgColors[index % bgColors.length];

        const btn = document.createElement('button');
        btn.className = 'w-full flex items-center gap-3 p-3.5 rounded-xl border border-neutral-100 hover:bg-neutral-50 hover:border-neutral-200 transition duration-150 text-left cursor-pointer focus:ring-2 focus:ring-blue-500 focus:outline-none';
        btn.id = `account-item-${index}`;
        btn.onclick = () => selectAccount(acc.name, acc.email);

        btn.innerHTML = `
          <div class="h-8 w-8 rounded-full ${bgColorClass} text-white flex items-center justify-center font-bold text-xs shrink-0 shadow-sm">
            ${firstLetter}
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-xs font-semibold text-neutral-800 truncate">${acc.name}</p>
            <p class="text-[10px] text-neutral-400 truncate">${acc.email}</p>
          </div>
          <div>
            <svg class="h-4 w-4 text-neutral-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    // Toggle showing "Add a new account" form
    function toggleNewAccount(show) {
      const section = document.getElementById('new-account-section');
      const bottomActions = document.getElementById('bottom-actions');
      const accountsContainer = document.getElementById('accounts-container');
      const titleText = document.getElementById('title-text');
      const divider = document.getElementById('modal-divider');

      if (show) {
        section.classList.remove('hidden');
        bottomActions.classList.add('hidden');
        accountsContainer.classList.add('hidden');
        divider.classList.add('hidden');
        titleText.textContent = 'Add a Google account';
      } else {
        section.classList.add('hidden');
        bottomActions.classList.remove('hidden');
        accountsContainer.classList.remove('hidden');
        divider.classList.remove('hidden');
        titleText.textContent = 'Choose an account';
      }
    }

    // Add another account dynamically
    function addAndSelectAccount() {
      const nameInput = document.getElementById('new-name-input');
      const emailInput = document.getElementById('new-email-input');

      const name = nameInput.value.trim();
      const email = emailInput.value.trim();

      if (!name || !email || !email.includes('@')) {
        alert('Please enter a valid Name and Gmail Address.');
        return;
      }

      // Check if already exists, else add
      const exists = accounts.find(a => a.email.toLowerCase() === email.toLowerCase());
      if (!exists) {
        accounts.push({ name, email, avatar: name.charAt(0).toUpperCase() });
        localStorage.setItem('tadka_google_accounts', JSON.stringify(accounts));
      }

      // Select it!
      selectAccount(name, email);
    }

    // Handle account selection
    function selectAccount(name, email) {
      if (window.opener) {
        // Send message to parent window with the selected credentials
        window.opener.postMessage({
          type: 'GOOGLE_SIGNIN_SUCCESS',
          email: email,
          name: name
        }, '*');
      }
      window.close();
    }

    // Close popup and message cancel to parent window
    function closePopup() {
      if (window.opener) {
        window.opener.postMessage({
          type: 'GOOGLE_SIGNIN_CANCELLED'
        }, '*');
      }
      window.close();
    }

    // Close on escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closePopup();
      }
    });

    // Run on load
    initAccounts();
  </script>
</body>
</html>
